stages:
  - format
  - lint
  - type_check
  - test
  - security
  - build

default:
  image: node:20-alpine
  before_script:
    - npm ci --legacy-peer-deps || npm install --legacy-peer-deps
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/

format:
  stage: format
  script:
    - npm run format:check || npx prettier --check "**/*.{ts,tsx,js,jsx,json,md,yml,yaml}"

lint:
  stage: lint
  script:
    - npm run lint

type_check:
  stage: type_check
  script:
    - npm run typecheck

test:
  stage: test
  script:
    - npm run test:coverage || npx vitest run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

audit:
  stage: security
  script:
    - npm audit --audit-level=high
  allow_failure: true

gitleaks:
  stage: security
  image: zricethezav/gitleaks:latest
  before_script: []
  script:
    - gitleaks detect --config .gitleaks.toml --no-banner --verbose --redact

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
