stages:
  - build
  - test
  - lint
  - security

build-job:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

test-job:
  stage: test
  image: node:20
  script:
    - npm ci
    - npx vitest run

coverage-job:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm run test:coverage

lint-job:
  stage: lint
  image: node:20
  script:
    - npm ci
    - npm run lint

knip-job:
  stage: lint
  image: node:20
  script:
    - npm ci
    - npx knip

secret-detection-job:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --verbose --source .

prettier-job:
  stage: lint
  image: node:20
  script:
    - npm ci
    - npx prettier --check "src/**/*.{ts,tsx}"
