stages:
  - lint
  - test
  - security
  - build

default:
  before_script:
    - . scripts/load-nvm-ci.sh
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
      - node_modules/

lint:
  stage: lint
  script:
    - npm run format:check
    - npm run lint
    - npm run typecheck
    - npm run knip

test:
  stage: test
  script:
    - npm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

gitleaks:
  stage: security
  before_script: []
  allow_failure: true
  script:
    - bash scripts/run-gitleaks.sh

audit:
  stage: security
  allow_failure: true
  script:
    - npm run audit || true

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
