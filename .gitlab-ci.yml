stages:
  - format
  - lint
  - typecheck
  - deadcode
  - test
  - security
  - audit
  - build

default:
  before_script:
    - . scripts/load-nvm-ci.sh
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
      - node_modules/

format:
  stage: format
  script:
    - npm run format:check

lint:
  stage: lint
  script:
    - npm run lint

typecheck:
  stage: typecheck
  script:
    - npm run typecheck

deadcode:
  stage: deadcode
  script:
    - npm run knip

test:
  stage: test
  script:
    - npm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

security:
  stage: security
  before_script: []
  allow_failure: true
  script:
    - bash scripts/run-gitleaks.sh

audit:
  stage: audit
  allow_failure: true
  script:
    - mkdir -p audit-report
    - npm run audit > audit-report/audit.txt 2>&1 || true
    - npm audit --json > audit-report/audit.json 2>&1 || true
    - cat audit-report/audit.txt
  artifacts:
    when: always
    paths:
      - audit-report/
    expire_in: 1 week

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
