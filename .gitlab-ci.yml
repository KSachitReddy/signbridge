stages:
  - format
  - lint
  - test
  - build

default:
  image: node:20-alpine
  before_script:
    - npm ci --legacy-peer-deps || npm install --legacy-peer-deps
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/

format:
  stage: format
  script:
    - npm run format:check || npx prettier --check "**/*.{ts,tsx,js,jsx,json,md,yml,yaml}"

lint:
  stage: lint
  script:
    - npm run lint

test:
  stage: test
  script:
    - npm run test:coverage || npx vitest run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
