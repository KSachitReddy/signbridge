stages:
  - build
  - test
  - lint
  - security

build-job:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

lint-job:
  stage: lint
  image: node:20
  script:
    - npm ci
    - npm run lint

knip-job:
  stage: lint
  image: node:20
  script:
    - npm ci
    - npx knip
