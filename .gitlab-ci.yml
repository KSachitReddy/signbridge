stages:
  - format
  - lint
  - typecheck
  - deadcode
  - test
  - audit
  - gitleaks
  - build

default:
  before_script:
    - . scripts/load-nvm-ci.sh
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/

format:
  stage: format
  script:
    - npm run format:check

lint:
  stage: lint
  script:
    - npm run lint

typecheck:
  stage: typecheck
  script:
    - npm run typecheck

deadcode:
  stage: deadcode
  script:
    - npx knip

test:
  stage: test
  script:
    - npm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

audit:
  stage: audit
  script:
    - npm audit --audit-level=high || true
  allow_failure: true

gitleaks:
  stage: gitleaks
  before_script: []
  allow_failure: true
  script:
    - bash scripts/run-gitleaks.sh

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
